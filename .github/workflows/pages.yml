name: Deploy website to GitHub Pages

# Publishes the contents of website/ (Sparkle appcast + landing page) to
# https://nigelw.github.io/Takes/. Only website/ is uploaded, so internal
# docs/ and source stay unpublished.

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Configure Pages
        uses: actions/configure-pages@v6
      - name: Upload website/ as the Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          name: github-pages-${{ github.run_id }}-${{ github.run_attempt }}
          path: './website'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
        with:
          artifact_name: github-pages-${{ github.run_id }}-${{ github.run_attempt }}
